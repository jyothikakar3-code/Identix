[theme]
base = "dark"
primaryColor = "#38bdf8"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#111827"
textColor = "#e5e7eb"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false

[client]
# Hide Streamlit's developer commands and their global shortcuts from users.
# This prevents typing in registration fields from opening "Clear caches".
toolbarMode = "minimal"
